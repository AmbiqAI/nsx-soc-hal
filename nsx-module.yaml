schema_version: 1

module:
  name: nsx-soc-hal
  type: soc
  version: "0.1.0"

support:
  ambiqsuite: true
  zephyr: false

summary: Shared SoC-level HAL integration layer for NSX targets.

capabilities:
  - soc_hal
  - low_level_platform
  - target_integration

use_cases:
  - foundational SoC integration
  - common low-level platform access
  - base dependency for most NSX runtime modules

agent_keywords:
  - soc
  - hal
  - low level
  - platform

build:
  cmake:
    package: nsx_soc_${target.soc}
    targets:
      - nsx::soc_hal

depends:
  required: []
  optional: []

compatibility:
  boards:
    - "*"
  socs:
    - apollo3
    - apollo3p
    - apollo4l
    - apollo4p
    - apollo5b
    - apollo510
    - apollo510b
    - apollo330P
  toolchains:
    - arm-none-eabi-gcc
    - armclang

    - atfe